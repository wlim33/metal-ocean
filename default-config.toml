cascade_count = 2
grid_cols = 256
grid_rows = 256
displacement_range_m = 12.0
max_in_flight_frames = 3

[wave]
wind_speed_mps = 12.0
wind_dir_rad   = 0.5
choppiness     = 1.35
swell          = 0.55
amplitude      = 7000.0

[sky]
cubemap_resolution = 128
sun_elevation_rad  = 0.7
sun_azimuth_rad    = 1.1
turbidity          = 3.0

[shading]
sss_strength       = 0.5
sss_view_boost     = 0.6
sss_view_power     = 3.0
scatter_strength   = 0.9
depth_fog_density  = 0.05
base_thickness_m   = 4.0
tonemap            = "aces"

[foam]
bias           = 0.75
gain           = 1.5
decay_seconds  = 3.0
dispersal      = 0.7
albedo         = 0.55
detail_scale   = 0.35
stretch        = 1.6
tear           = 0.8

[bench]
bench_mode      = false
warmup_frames   = 60
measure_frames  = 600
camera_path     = "orbit"
output_path     = "bench-{timestamp}.csv"
